[project]
site_name = "QualCoder"
site_url = "https://qualcoder.org"
site_description = "QualCoder Website"
site_author = "QualCoder Teams"
docs_dir = "docs"
repo_url = "https://github.com/QualCoder-Org/qualcoder-org.github.io"
repo_name = "QualCoder-Org/qualcoder-org.github.io"
edit_uri = "edit/main/docs/"
nav = [
	{"Home" = "index.md"},
	{"Blog" = "https://qualcoder.wordpress.com/"},
	{Documentation" = "doc/"},
	{"Resources" = "ressources.md"},
	{"Videos on QualCoder" = "videos.md"},
	{"Studies using QualCoder" = "using.md"},
	{"About Developers" = "about.md"},
	{"Forum" = "https://github.com/ccbogel/QualCoder/discussions"}
]

[project.theme]
variant = "modern" # classic = old them vs modern
language = "en"
logo = "images/logo.png"
features = [
  "content.action.edit", # Edit this page
  "content.action.view",  # View source of this page
  "navigation.sections",
  "navigation.expand",
  "navigation.path",
  "navigation.indexes",
  "toc.integrate",
  "search.highlight",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.footer"
 
]

[[project.theme.palette]]
scheme = "deep purple"
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.extra]
alternate = [
    { name = "English", link = "/en/", lang = "en" },
    { name = "Español", link = "/es/", lang = "es" },
    { name = "Français", link = "/fr/", lang = "fr" }
]

