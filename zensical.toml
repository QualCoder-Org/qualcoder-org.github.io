[project.theme]
variant = "modern"  
logo = "images/logo.png"  
custom_dir = "overrides"
features = [  
  "content.action.edit",  
  "content.action.view",  
  "navigation.sections",  
  "navigation.expand",
  "navigation.tabs",
  "navigation.path",  
  "navigation.indexes",  
  "toc.integrate",  
  "search.highlight",  
  "navigation.tabs",  
  "navigation.footer",  
  "content.tabs.link"  
]
  
[[project.theme.palette]]
scheme = "default"  
media = "(prefers-color-scheme: light)"  
toggle.icon = "lucide/sun"  
toggle.name = "Switch to dark mode"  
  
[[project.theme.palette]]
scheme = "slate"  
media = "(prefers-color-scheme: dark)"  
toggle.icon = "lucide/moon"  
toggle.name = "Switch to light mode"  
  
[project.extra]
alternate = [  
    { name = "English", link = "/doc/en/", lang = "en" },  
    { name = "Español", link = "/doc/es/", lang = "es" },  
    { name = "Deutsch", link = "/doc/de/", lang = "de" },  
    { name = "Français", link = "/doc/fr/", lang = "fr" }  
]
