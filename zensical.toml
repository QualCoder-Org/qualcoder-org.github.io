[project.theme]
variant = "modern"  
logo = "images/logo.png"  
custom_dir = "overrides"
features = [  
#  "content.action.edit",  
#  "content.action.view",  
#  "navigation.sections",
#  "navigation.expand",
#  "navigation.tabs",
#  "navigation.path",  
#  "navigation.indexes",
#  "toc.follow",
#  "toc.integrate",  
#  "search.highlight",  
#  "navigation.tabs",  
#  "navigation.footer",  
#  "content.tabs.link"  
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "search.highlight"
]
  
[[project.theme.palette]]
scheme = "default"  
media = "(prefers-color-scheme: light)"  
toggle.icon = "lucide/sun"  
toggle.name = "Switch to dark mode"  
  
[[project.theme.palette]]
scheme = "slate"  
media = "(prefers-color-scheme: dark)"  
toggle.icon = "lucide/moon"  
toggle.name = "Switch to light mode"  
  
[project.extra]
alternate = [  
