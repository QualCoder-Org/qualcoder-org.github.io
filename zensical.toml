[project]
site_name = "QualCoder"
site_url = "https://qualcoder.org"
site_description = "QualCoder Website"
site_author = "QualCoder Teams"
docs_dir = "docs"
repo_url = "https://github.com/QualCoder-Org/qualcoder-org.github.io"
repo_name = "QualCoder-Org/qualcoder-org.github.io"
edit_uri = "edit/main/docs/"
nav = [
	{"Home" = "index.md"},
	{"Blog" = "https://qualcoder.wordpress.com/"},
	{"Resources" = "ressources.md"},
	{"Videos on QualCoder" = "videos.md"},
	{"Studies using QualCoder" = "using.md"},
	{"About Developers" = "about.md"},
	{"Forum" = "https://github.com/ccbogel/QualCoder/discussions"},
	{"Documentation" = [
		"{{ lang }}/index.md",
		"{{ lang }}/1.-Overview.md",
		"{{ lang }}/2.1.-Installation.md",
		"{{ lang }}/2.2.-Settings.md",
		"{{ lang }}/2.3.-AI-Setup.md",
		"{{ lang }}/2.4.-Working-in-a-Team.md",
		"{{ lang }}/3.1.-Creating-a-New-Project.md",
		"{{ lang }}/3.2.-Files.md",
		"{{ lang }}/3.3.-Cases.md",
		"{{ lang }}/3.4.-Attributes.md",
		"{{ lang }}/4.1.-Coding-Text.md",
		"{{ lang }}/4.2.-AI-Assisted-Coding.md",
		"{{ lang }}/4.3.-Coding-Text-on-PDFs.md",
		"{{ lang }}/4.4.-Coding-Images.md",
		"{{ lang }}/4.5.-Coding-Audio-and-Video.md",
		"{{ lang }}/4.6-Code-Organiser.md",
		"{{ lang }}/5.1.-AI-chat-based-analysis.md",
		"{{ lang }}/5.2.-Journals.md",
		"{{ lang }}/5.3.-Reports.md",
		"{{ lang }}/5.4.-Graph.md",
		"{{ lang }}/6.1.-Imports-and-Exports.md",
		"{{ lang }}/6.2.-AI-Prompt-Library.md",
		"{{ lang }}/7.3.-QualCoder-Development.md",
		"{{ lang }}/7.4.-SQlite-Data-Structure.md",
		"{{ lang }}/7.5.-AI-Technical-Information.md",
		"{{ lang }}/7.6.-How-to-contribute.md"								
	]}
]

[project.theme]
variant = "modern" # classic = old them vs modern
language = "en"
logo = "images/logo.png"
features = [
  "content.action.edit", # Edit this page
  "content.action.view",  # View source of this page
  "navigation.sections",
  "navigation.expand",
  "navigation.path",
  "navigation.indexes",
  "toc.integrate",
  "search.highlight",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.footer"
]

[[project.theme.palette]]
scheme = "deep purple"
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.extra]
alternate = [
    { name = "English", link = "/en/", lang = "en" },
    { name = "Español", link = "/es/", lang = "es" },
    { name = "Deutsch", link = "/de/", lang = "de" },
    { name = "Français", link = "/fr/", lang = "fr" }
]

